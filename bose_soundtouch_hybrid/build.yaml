# Maps each supported arch (config.yaml's `arch:` list) to the matching
# Home Assistant base image, which supplies bashio + s6-overlay init.
# Supervisor passes the resolved value as the Dockerfile's BUILD_FROM arg.
build_from:
  aarch64: ghcr.io/home-assistant/aarch64-base:3.19
  amd64: ghcr.io/home-assistant/amd64-base:3.19
  armv7: ghcr.io/home-assistant/armv7-base:3.19
